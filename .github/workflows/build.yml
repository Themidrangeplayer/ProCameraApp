name: Build ProCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Generate placeholder launcher icons
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          for size in 48 72 96 144 192; do
            case $size in
              48)  dpi="mdpi"    ;;
              72)  dpi="hdpi"    ;;
              96)  dpi="xhdpi"   ;;
              144) dpi="xxhdpi"  ;;
              192) dpi="xxxhdpi" ;;
            esac
            mkdir -p app/src/main/res/mipmap-$dpi
            convert -size ${size}x${size} xc:#FFD700 \
              -font DejaVu-Sans-Bold -pointsize $((size/3)) \
              -fill black -gravity center -annotate 0 "PRO" \
              app/src/main/res/mipmap-$dpi/ic_launcher.png 2>/dev/null || \
            python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import os
          size = $size
          img = Image.new('RGB', (size, size), color=(255, 215, 0))
          d = ImageDraw.Draw(img)
          d.text((size//2, size//2), 'P', fill=(0,0,0), anchor='mm')
          os.makedirs('app/src/main/res/mipmap-$dpi', exist_ok=True)
          img.save('app/src/main/res/mipmap-$dpi/ic_launcher.png')
          " 2>/dev/null || \
            cp app/src/main/res/drawable/circle_red.xml app/src/main/res/mipmap-$dpi/ic_launcher.png 2>/dev/null || true
          done
          # Fallback: copy between dirs if any succeeded
          for size in 48 72 96 144 192; do
            case $size in
              48)  dpi="mdpi"    ;;
              72)  dpi="hdpi"    ;;
              96)  dpi="xhdpi"   ;;
              144) dpi="xxhdpi"  ;;
              192) dpi="xxxhdpi" ;;
            esac
            if [ ! -f "app/src/main/res/mipmap-$dpi/ic_launcher.png" ]; then
              mkdir -p app/src/main/res/mipmap-$dpi
              printf '\x89PNG\r\n\x1a\n' > app/src/main/res/mipmap-$dpi/ic_launcher.png || true
            fi
            cp app/src/main/res/mipmap-$dpi/ic_launcher.png \
               app/src/main/res/mipmap-$dpi/ic_launcher_round.png 2>/dev/null || true
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProCam-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
